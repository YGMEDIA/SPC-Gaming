<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Schema-Vergleich zweier Analogstick-Techniken: Magnet mit Sensor links, Schichten-Stapel rechts">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1e3d"/>
      <stop offset="0.55" stop-color="#122b56"/>
      <stop offset="1" stop-color="#0a1a35"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5aa2ff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#5aa2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8eefb"/>
      <stop offset="1" stop-color="#9fb4dd"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="420" cy="470" r="330" fill="url(#glow)"/>
  <circle cx="1180" cy="470" r="330" fill="url(#glow)"/>
  <line x1="800" y1="150" x2="800" y2="750" stroke="#2a4a86" stroke-width="3" stroke-dasharray="10 14"/>

  <!-- links: Hall-Prinzip (Stick-Kappe, Magnet, Feldlinien, Sensor-Balken) -->
  <g transform="translate(420,0)">
    <rect x="-28" y="200" width="56" height="130" rx="16" fill="url(#stick)"/>
    <ellipse cx="0" cy="200" rx="95" ry="34" fill="#dde7fa"/>
    <rect x="-42" y="340" width="84" height="52" rx="10" fill="#c94f4f"/>
    <rect x="-42" y="392" width="84" height="52" rx="10" fill="#3f83ec"/>
    <path d="M-70 470 C-120 530 -120 590 -70 640 M70 470 C120 530 120 590 70 640 M-30 480 C-60 530 -60 590 -30 634 M30 480 C60 530 60 590 30 634"
          fill="none" stroke="#5aa2ff" stroke-width="6" opacity="0.75" stroke-linecap="round"/>
    <rect x="-120" y="650" width="240" height="42" rx="12" fill="#1c3a74" stroke="#5aa2ff" stroke-width="3"/>
    <circle cx="0" cy="671" r="9" fill="#9cc5ff"/>
  </g>

  <!-- rechts: TMR-Prinzip (Stick-Kappe, Schichten-Stapel, Messpfeil) -->
  <g transform="translate(1180,0)">
    <rect x="-28" y="200" width="56" height="130" rx="16" fill="url(#stick)"/>
    <ellipse cx="0" cy="200" rx="95" ry="34" fill="#dde7fa"/>
    <rect x="-130" y="352" width="260" height="34" rx="8" fill="#3f83ec"/>
    <rect x="-130" y="396" width="260" height="22" rx="8" fill="#cfe0ff"/>
    <rect x="-130" y="428" width="260" height="34" rx="8" fill="#c94f4f"/>
    <rect x="-130" y="472" width="260" height="22" rx="8" fill="#cfe0ff"/>
    <rect x="-130" y="504" width="260" height="34" rx="8" fill="#1c3a74" stroke="#5aa2ff" stroke-width="2"/>
    <path d="M-170 370 L-170 520" stroke="#9cc5ff" stroke-width="6" stroke-linecap="round"/>
    <path d="M-170 370 L-184 396 M-170 370 L-156 396" stroke="#9cc5ff" stroke-width="6" stroke-linecap="round"/>
    <circle cx="160" cy="437" r="26" fill="none" stroke="#5aa2ff" stroke-width="6"/>
    <circle cx="160" cy="437" r="7" fill="#9cc5ff"/>
  </g>

  <ellipse cx="800" cy="812" rx="560" ry="26" fill="#0a1730" opacity="0.85"/>
</svg>
