<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Zwei Smartphone-Controller einander gegenueber, dazwischen ein Energie-Impuls">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1e3d"/>
      <stop offset="0.55" stop-color="#122b56"/>
      <stop offset="1" stop-color="#0a1a35"/>
    </linearGradient>
    <linearGradient id="padL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8eefb"/>
      <stop offset="1" stop-color="#b9c9ea"/>
    </linearGradient>
    <linearGradient id="padR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#2e6fe0"/>
      <stop offset="1" stop-color="#1c4aa8"/>
    </linearGradient>
    <radialGradient id="glowC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5aa2ff" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#2e6fe0" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2e6fe0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#cfe0ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#cfe0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="330" cy="450" r="330" fill="url(#glowL)"/>
  <circle cx="1270" cy="450" r="330" fill="url(#glowL)"/>
  <circle cx="800" cy="450" r="300" fill="url(#glowC)"/>

  <!-- linker Controller (hell, kompakt) -->
  <g transform="translate(120,300)">
    <rect x="0" y="0" width="150" height="300" rx="60" fill="url(#padL)"/>
    <rect x="150" y="60" width="310" height="180" rx="18" fill="#182f5c"/>
    <rect x="166" y="76" width="278" height="148" rx="10" fill="#0e2144"/>
    <circle cx="75" cy="105" r="34" fill="#8fa8d8"/>
    <circle cx="75" cy="105" r="22" fill="#dde7fa"/>
    <circle cx="60" cy="205" r="10" fill="#8fa8d8"/>
    <circle cx="90" cy="205" r="10" fill="#8fa8d8"/>
    <circle cx="75" cy="190" r="10" fill="#8fa8d8"/>
    <circle cx="75" cy="220" r="10" fill="#8fa8d8"/>
  </g>

  <!-- rechter Controller (blau, massiv) -->
  <g transform="translate(1480,300) scale(-1,1)">
    <rect x="0" y="0" width="150" height="300" rx="46" fill="url(#padR)"/>
    <rect x="150" y="60" width="310" height="180" rx="18" fill="#182f5c"/>
    <rect x="166" y="76" width="278" height="148" rx="10" fill="#0e2144"/>
    <circle cx="75" cy="105" r="36" fill="#153c86"/>
    <circle cx="75" cy="105" r="23" fill="#5aa2ff"/>
    <circle cx="60" cy="205" r="11" fill="#5aa2ff"/>
    <circle cx="90" cy="205" r="11" fill="#7db4ff"/>
    <circle cx="75" cy="190" r="11" fill="#9cc5ff"/>
    <circle cx="75" cy="220" r="11" fill="#3f83ec"/>
  </g>

  <!-- Energie-Impuls in der Mitte -->
  <g stroke-linecap="round">
    <path d="M760 330 L820 435 L775 445 L840 570" fill="none" stroke="#5aa2ff" stroke-width="16" opacity="0.9"/>
    <path d="M760 330 L820 435 L775 445 L840 570" fill="none" stroke="#cfe0ff" stroke-width="6"/>
    <circle cx="712" cy="392" r="7" fill="#9cc5ff"/>
    <circle cx="884" cy="392" r="6" fill="#7db4ff"/>
    <circle cx="700" cy="512" r="5" fill="#7db4ff"/>
    <circle cx="896" cy="516" r="7" fill="#9cc5ff"/>
  </g>

  <!-- Bodenreflex -->
  <ellipse cx="800" cy="812" rx="560" ry="26" fill="#0a1730" opacity="0.85"/>
  <ellipse cx="800" cy="806" rx="430" ry="14" fill="#1c3a74" opacity="0.5"/>
</svg>
