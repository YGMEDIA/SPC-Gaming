<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Smartphone-Controller neben drei aufsteigenden Muenzstapeln">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1e3d"/>
      <stop offset="0.55" stop-color="#122b56"/>
      <stop offset="1" stop-color="#0a1a35"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5aa2ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5aa2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9cc5ff"/>
      <stop offset="1" stop-color="#3f83ec"/>
    </linearGradient>
    <linearGradient id="pad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2e6fe0"/>
      <stop offset="1" stop-color="#1c4aa8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="520" cy="470" r="360" fill="url(#glow)"/>
  <circle cx="1220" cy="520" r="280" fill="url(#glow)"/>

  <!-- Teleskop-Controller mit eingespanntem Screen -->
  <g transform="translate(200,300)">
    <rect x="0" y="0" width="140" height="290" rx="44" fill="url(#pad)"/>
    <rect x="500" y="0" width="140" height="290" rx="44" fill="url(#pad)"/>
    <rect x="130" y="55" width="380" height="180" rx="16" fill="#182f5c"/>
    <rect x="146" y="71" width="348" height="148" rx="10" fill="#0e2144"/>
    <circle cx="70" cy="100" r="32" fill="#153c86"/>
    <circle cx="70" cy="100" r="20" fill="#5aa2ff"/>
    <circle cx="556" cy="190" r="10" fill="#9cc5ff"/>
    <circle cx="584" cy="162" r="10" fill="#7db4ff"/>
    <circle cx="584" cy="218" r="10" fill="#3f83ec"/>
    <circle cx="612" cy="190" r="10" fill="#cfe0ff"/>
    <path d="M52 196 h36 M70 178 v36" stroke="#9cc5ff" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- drei aufsteigende Muenzstapel -->
  <g transform="translate(1060,0)">
    <g>
      <ellipse cx="60" cy="700" rx="62" ry="18" fill="url(#coin)"/>
      <rect x="-2" y="640" width="124" height="60" rx="16" fill="url(#coin)"/>
      <ellipse cx="60" cy="640" rx="62" ry="18" fill="#cfe0ff"/>
    </g>
    <g transform="translate(160,-70)">
      <ellipse cx="60" cy="700" rx="62" ry="18" fill="url(#coin)"/>
      <rect x="-2" y="600" width="124" height="100" rx="16" fill="url(#coin)"/>
      <ellipse cx="60" cy="600" rx="62" ry="18" fill="#cfe0ff"/>
    </g>
    <g transform="translate(320,-140)">
      <ellipse cx="60" cy="700" rx="62" ry="18" fill="url(#coin)"/>
      <rect x="-2" y="560" width="124" height="140" rx="16" fill="url(#coin)"/>
      <ellipse cx="60" cy="560" rx="62" ry="18" fill="#cfe0ff"/>
    </g>
  </g>

  <ellipse cx="800" cy="812" rx="560" ry="26" fill="#0a1730" opacity="0.85"/>
</svg>
