<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Grosses Tablet auf einem Staender, davor ein kabelloses Gamepad">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1e3d"/>
      <stop offset="0.55" stop-color="#122b56"/>
      <stop offset="1" stop-color="#0a1a35"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5aa2ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5aa2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="padg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e6fe0"/>
      <stop offset="1" stop-color="#1c4aa8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="430" r="380" fill="url(#glow)"/>

  <!-- Tablet auf Staender -->
  <g transform="translate(800,120)">
    <rect x="-330" y="0" width="660" height="470" rx="28" fill="#182f5c" stroke="#3b5f9e" stroke-width="4"/>
    <rect x="-302" y="28" width="604" height="414" rx="14" fill="#0e2144"/>
    <circle cx="-190" cy="235" r="46" fill="none" stroke="#5aa2ff" stroke-width="8"/>
    <path d="M-190 205 v60 M-220 235 h60" stroke="#5aa2ff" stroke-width="8" stroke-linecap="round"/>
    <circle cx="150" cy="200" r="16" fill="#9cc5ff"/>
    <circle cx="210" cy="255" r="16" fill="#3f83ec"/>
    <circle cx="150" cy="310" r="16" fill="#7db4ff"/>
    <circle cx="90" cy="255" r="16" fill="#cfe0ff"/>
    <path d="M-120 470 L-40 560 h160 L200 470" fill="#1c3a74"/>
    <rect x="-140" y="556" width="360" height="18" rx="9" fill="#25488c"/>
  </g>

  <!-- kabelloses Gamepad davor -->
  <g transform="translate(800,690)">
    <path d="M-210 0 q-70 0 -88 70 q-12 58 40 62 q40 2 62 -40 q18 -34 60 -34 h272 q42 0 60 34 q22 42 62 40 q52 -4 40 -62 q-18 -70 -88 -70 z" fill="url(#padg)"/>
    <circle cx="-130" cy="28" r="26" fill="#153c86"/>
    <circle cx="-130" cy="28" r="15" fill="#5aa2ff"/>
    <circle cx="96" cy="14" r="11" fill="#9cc5ff"/>
    <circle cx="152" cy="42" r="11" fill="#7db4ff"/>
    <circle cx="124" cy="70" r="11" fill="#3f83ec"/>
    <circle cx="124" cy="-14" r="11" fill="#cfe0ff"/>
    <path d="M-40 20 h30 M-25 5 v30" stroke="#9cc5ff" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- Funk-Wellen zwischen Gamepad und Tablet -->
  <g fill="none" stroke="#5aa2ff" stroke-linecap="round" opacity="0.8">
    <path d="M760 640 q40 -18 80 0" stroke-width="7"/>
    <path d="M745 616 q55 -26 110 0" stroke-width="6" opacity="0.6"/>
    <path d="M730 592 q70 -34 140 0" stroke-width="5" opacity="0.4"/>
  </g>

  <ellipse cx="800" cy="850" rx="560" ry="24" fill="#0a1730" opacity="0.85"/>
</svg>
